name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: blaming-diff-filter
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: blaming-diff-filter.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: blaming-diff-filter
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: blaming-diff-filter

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blaming-diff-filter-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mv artifacts/blaming-diff-filter-x86_64-unknown-linux-musl/blaming-diff-filter \
             blaming-diff-filter-x86_64-unknown-linux-musl
          mv artifacts/blaming-diff-filter-x86_64-pc-windows-msvc/blaming-diff-filter.exe \
             blaming-diff-filter-x86_64-pc-windows-msvc.exe
          mv artifacts/blaming-diff-filter-x86_64-apple-darwin/blaming-diff-filter \
             blaming-diff-filter-x86_64-apple-darwin
          mv artifacts/blaming-diff-filter-aarch64-apple-darwin/blaming-diff-filter \
             blaming-diff-filter-aarch64-apple-darwin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            blaming-diff-filter-x86_64-unknown-linux-musl
            blaming-diff-filter-x86_64-pc-windows-msvc.exe
            blaming-diff-filter-x86_64-apple-darwin
            blaming-diff-filter-aarch64-apple-darwin
